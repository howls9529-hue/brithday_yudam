<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>돌잔치 초대장</title>
  <meta name="description" content="따뜻한 감성의 모바일 돌잔치 초대장" />

  <!-- OG 메타태그 (카카오톡 썸네일용) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="윤유담 첫돌에 초대합니다">
  <meta property="og:description" content="사랑하는 유담이의 소중한 첫 생일에 여러분을 초대합니다">
  <meta property="og:image" content="https://howls9529-hue.github.io/brithday_yudam/images/thumbnail.jpg">
  <meta property="og:url" content="https://howls9529-hue.github.io/brithday_yudam/">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
<body>
  <audio id="bgm" loop>
    <source src="audio/bgm.mp3" type="audio/mpeg" />
  </audio>

  <div class="floating-controls">
    <button class="fab" id="musicToggle" aria-label="배경음악 재생">🎵</button>
    <button class="fab" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })" aria-label="맨 위로">↑</button>
  </div>

  <main class="wrap">
    <section class="hero reveal">
      <img src="images/hero.jpg" alt="대표 사진" />
      <div class="hero-content">
        <div class="eyebrow">FIRST BIRTHDAY PARTY</div>
        <h1>소중한 첫 번째 생일에<br />여러분을 초대합니다</h1>
        <div class="sub">윤유담 · 2026년 6월 20일 토요일 오전 11시 30분</div>
        <div class="badge-row">
          <div class="badge">더블유페스타 일산점</div>
          <div class="badge">따뜻한 마음으로 함께해 주세요</div>
        </div>
      </div>
    </section>

    <section class="intro card reveal">
      <div class="flower"></div>
      <h2 class="message-title">초대합니다</h2>
      <p>
        사랑으로 채워진 지난 1년,<br />
        작은 손과 웃음으로 저희 가족의 하루하루가 더욱 빛났습니다.<br />
        그 소중한 첫 생일을 맞아 감사한 분들과 따뜻한 시간을 나누고 싶습니다.<br />
        바쁘시더라도 함께 자리해 주셔서 첫걸음을 축복해 주세요.
      </p>
    </section>

    <section class="section slider-card reveal">
      <h3 class="section-title">우리 아이의 반짝이는 순간</h3>
      <p class="section-sub">유담이의 1년간의 과정</p>
      <div class="divider"></div>

      <div class="slider" id="photoSlider">
        <div class="slides">
          <div class="slide"><img src="images/slide1.jpg" alt="슬라이드 사진 1" /></div>
          <div class="slide"><img src="images/slide2.jpg" alt="슬라이드 사진 2" /></div>
          <div class="slide"><img src="images/slide3.jpg" alt="슬라이드 사진 3" /></div>
          <div class="slide"><img src="images/slide4.jpg" alt="슬라이드 사진 4" /></div>
        </div>
      </div>

      <div class="slider-caption">사랑받으며 자란 순간들을 함께 나눕니다</div>

      <div class="slider-buttons">
        <button class="nav-btn" id="prevBtn" aria-label="이전 사진">←</button>
        <button class="nav-btn" id="nextBtn" aria-label="다음 사진">→</button>
      </div>

      <div class="dots" id="dots"></div>
    </section>

    <section class="section card reveal">
      <h3 class="section-title">행사 안내</h3>
      <p class="section-sub">오시는 걸음이 편하실 수 있도록 준비했습니다</p>
      <div class="divider"></div>

      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">일시</div>
          <div class="info-value">2026년 6월 20일 토요일 오전 11시 30분</div>
        </div>
        <div class="info-item">
          <div class="info-label">장소</div>
          <div class="info-value">경기도 일산서구 일현로 97-11 1동, 지하 2층(더블유페스타 일산점) </div>
        </div>
        <div class="info-item">
          <div class="info-label">아이 이름</div>
          <div class="info-value">윤유담</div>
        </div>
        <div class="info-item">
          <div class="info-label">마음 전할 분</div>
          <div class="info-value">아빠 윤호진 · 엄마 김혜민</div>
        </div>
      </div>
    </section>

    <section class="section count-card card reveal">
      <h3 class="count-title">첫 생일까지</h3>
      <div class="count-date" id="partyDateText">2026.06.20</div>
      <div class="count-boxes">
        <div class="count-box">
          <div class="count-num" id="days">0</div>
          <div class="count-label">DAYS</div>
        </div>
        <div class="count-box">
          <div class="count-num" id="hours">0</div>
          <div class="count-label">HOURS</div>
        </div>
        <div class="count-box">
          <div class="count-num" id="minutes">0</div>
          <div class="count-label">MIN</div>
        </div>
        <div class="count-box">
          <div class="count-num" id="seconds">0</div>
          <div class="count-label">SEC</div>
        </div>
      </div>
    </section>

    <section class="section card reveal">
      <h3 class="section-title">갤러리</h3>
      <p class="section-sub">터치하면 크게 볼 수 있습니다</p>
      <div class="divider"></div>

      <div class="gallery-grid" id="gallery">
        <img src="images/gallery1.jpg" alt="갤러리 사진 1" />
        <img src="images/gallery2.jpg" alt="갤러리 사진 2" />
        <img src="images/gallery3.jpg" alt="갤러리 사진 3" />
        <img src="images/gallery4.jpg" alt="갤러리 사진 4" />
        <img src="images/gallery5.jpg" alt="갤러리 사진 5" />
        <img src="images/gallery6.jpg" alt="갤러리 사진 6" />
      </div>
    </section>

    <section class="section map-card reveal">
      <h3 class="section-title">오시는 길</h3>
      <div class="divider"></div>

      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">주소</div>
          <div class="info-value">경기도 일산서구 일현로 97-11 1동, 지하 2층</div>
        </div>
        <div class="info-item">
          <div class="info-label">주차</div>
          <div class="info-value">건물 내 주차 가능</div>
        </div>
      </div>

      <div class="map-frame">
        <iframe
          title="행사장 지도"
          src="https://maps.google.com/maps?q=더블유페스타%20일산점&z=15&output=embed"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>

      <div class="action-row">
        <a class="action-btn primary" href="https://map.kakao.com/?q=더블유페스타 일산점" target="_blank" rel="noreferrer">카카오맵 열기</a>
        <a class="action-btn" href="https://map.naver.com/v5/search/더블유페스타 일산점" target="_blank" rel="noreferrer">네이버지도 열기</a>
      </div>
    </section>

    <section class="section contact-card reveal">
      <h3 class="section-title">연락하기</h3>
      <p class="section-sub">전화번호는 실제 번호로 변경해 주세요</p>
      <div class="divider"></div>

      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">아빠</div>
          <div class="info-value">010-7195-4498</div>
        </div>
        <div class="info-item">
          <div class="info-label">엄마</div>
          <div class="info-value">010-7336-0896</div>
        </div>
      </div>

      <div class="contact-row">
        <a class="contact-btn primary" href="tel:01071954498">아빠에게 전화</a>
        <a class="contact-btn" href="tel:01073360896">엄마에게 전화</a>
      </div>
    </section>

    <footer class="footer">
      사랑으로 키운 첫 해, 함께해 주시는 마음을 오래 간직하겠습니다.
    </footer>
  </main>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose" aria-label="닫기">✕</button>
    <img id="lightboxImg" src="" alt="확대 이미지" />
  </div>

  <script>
    const partyDate = new Date('2026-06-20T11:30:00');

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function updateCountdown() {
      const now = new Date();
      const diff = Math.max(0, partyDate - now);

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById('days').textContent = pad(days);
      document.getElementById('hours').textContent = pad(hours);
      document.getElementById('minutes').textContent = pad(minutes);
      document.getElementById('seconds').textContent = pad(seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    const slider = document.querySelector('.slides');
    const slides = Array.from(document.querySelectorAll('.slide'));
    const dotsWrap = document.getElementById('dots');
    const total = slides.length;
    let index = 0;
    let autoPlay;

    for (let i = 0; i < total; i++) {
      const dot = document.createElement('button');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.setAttribute('aria-label', `${i + 1}번 사진 보기`);
      dot.addEventListener('click', () => goToSlide(i));
      dotsWrap.appendChild(dot);
    }

    function renderDots() {
      [...dotsWrap.children].forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
      });
    }

    function goToSlide(i) {
      index = (i + total) % total;
      slider.style.transform = `translateX(-${index * 100}%)`;
      renderDots();
    }

    function nextSlide() { goToSlide(index + 1); }
    function prevSlide() { goToSlide(index - 1); }

    document.getElementById('nextBtn').addEventListener('click', () => {
      nextSlide();
      restartAutoPlay();
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      prevSlide();
      restartAutoPlay();
    });

    function startAutoPlay() {
      autoPlay = setInterval(nextSlide, 3500);
    }

    function restartAutoPlay() {
      clearInterval(autoPlay);
      startAutoPlay();
    }

    startAutoPlay();

    const audio = document.getElementById('bgm');
    const musicToggle = document.getElementById('musicToggle');
    let playing = false;

    async function toggleMusic() {
      try {
        if (!playing) {
          await audio.play();
          playing = true;
          musicToggle.textContent = '⏸';
        } else {
          audio.pause();
          playing = false;
          musicToggle.textContent = '🎵';
        }
      } catch (e) {
        alert('모바일 브라우저 정책상 링크를 열자마자 소리 있는 음악 자동재생은 제한될 수 있습니다. 화면을 한 번 터치하면 바로 재생됩니다.');
      }
    }

    musicToggle.addEventListener('click', toggleMusic);

    async function tryStartMusic() {
      if (playing) return;
      try {
        await audio.play();
        playing = true;
        musicToggle.textContent = '⏸';
      } catch (e) {
        // 모바일 정책상 실패 가능
      }
    }

    window.addEventListener('load', tryStartMusic);
    document.addEventListener('click', tryStartMusic, { once: true });
    document.addEventListener('touchstart', tryStartMusic, { once: true });
    document.addEventListener('scroll', tryStartMusic, { once: true });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.16 });

    document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');

    document.querySelectorAll('#gallery img').forEach((img) => {
      img.addEventListener('click', () => {
        lightboxImg.src = img.src;
        lightbox.classList.add('open');
      });
    });

    function closeLightbox() {
      lightbox.classList.remove('open');
      lightboxImg.src = '';
    }

    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });
  </script>
</body>
</html>
